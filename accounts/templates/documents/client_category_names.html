<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Client Wise Category Names</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
    }

    /* ✅ Row highlight */
    #allCategoryNameBody tr.row-selected > td {
      background-color: #d9ecff !important; /* light blue */
    }

    #allCategoryNameBody tr {
      cursor: pointer;
    }

    /*  Page close button */
    .page-close-btn {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 1050;

      width: 34px;
      height: 34px;
      border: none;
      border-radius: 6px;

      background: #dc3545;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      line-height: 1;
      cursor: pointer;
    }

    .page-close-btn:hover {
      background: #bb2d3b;
    }

    .filter-row select {
      width: 100%;
      font-size: 12px;
      padding: 2px 4px;
    }

  </style>
</head>

<body>

  <button type="button"
        class="page-close-btn"
        title="Close"
        onclick="window.location.href='/'">
  &times;
</button>


<div class="container-fluid p-3">
  <h5 class="mb-3">Client Wise Category Names</h5>
  
  <div class="table-responsive">
    <table class="table table-sm table-bordered align-middle">
      <thead class="table-dark">
        <tr>
          <th>Client</th>
          <th>Category Type</th>
          <th>Category Name</th>
          <th>Passwords</th>
          <th class="text-center">Active</th>
          <th width="140">Action</th>

        </tr>
            
      <!-- 🔍 FILTER ROW (LIKE BUSY PAGE) -->
      <tr class="filter-row">
        <th>
          <select class="col-filter" data-col="0">
            <option value="">All</option>
          </select>
        </th>

        <th>
          <select class="col-filter" data-col="1">
            <option value="">All</option>
          </select>
        </th>

        <th>
          <select class="col-filter" data-col="2">
            <option value="">All</option>
          </select>
        </th>

        <th>
          <select class="col-filter" data-col="3">
            <option value="">All</option>
          </select>
        </th>

        <th>
          <select class="col-filter" data-col="4">
            <option value="">All</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </th>

        <th></th>
      </tr>
      </thead>

      <tbody id="allCategoryNameBody">
        <tr>
          <td colspan="5" class="text-center text-muted">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function loadAllCategoryNames() {
  const tbody = document.getElementById("allCategoryNameBody");

  try {
    const res = await fetch("/client-category-names/", {
        headers: {
            "X-Requested-With": "XMLHttpRequest"
        }
        });

    const data = await res.json();

    if (!data.ok || !data.items.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="5" class="text-center text-muted">No data found</td>
        </tr>`;
      return;
    }

    tbody.innerHTML = "";

    data.items.forEach(row => {
      tbody.insertAdjacentHTML("beforeend", `
        <tr data-id="${row.id}">
          <td>${row.client}</td>
          <td>${row.category_type}</td>
          <td>${row.name}</td>
          <td>${row.passwords || "-"}</td>
          <td class="text-center">${row.is_active ? "Yes" : "No"}</td>
          <td class="text-center">
            <button class="btn btn-sm btn-primary me-1"
                    onclick="editCategory(${row.id}, event)">
              Edit
            </button>
            <button class="btn btn-sm btn-danger"
                    onclick="deleteCategory(${row.id}, event)">
              Delete
            </button>
          </td>
        </tr>
      `);
    });

    attachRowClick();
    populateColumnFilters();
    applyColumnFilters();

  } catch (err) {
    console.error(err);
    tbody.innerHTML = `
      <tr>
        <td colspan="5" class="text-center text-danger">
          Error loading data
        </td>
      </tr>`;
  }
}

/* ✅ Row click highlight logic */
function attachRowClick() {
  const tbody = document.getElementById("allCategoryNameBody");

  tbody.querySelectorAll("tr").forEach(tr => {
    tr.addEventListener("click", () => {

      // remove previous highlight
      tbody.querySelectorAll("tr.row-selected")
           .forEach(r => r.classList.remove("row-selected"));

      // highlight clicked row
      tr.classList.add("row-selected");

      console.log("Selected ID:", tr.dataset.id);
    });
  });
}

/* Load on page load */
document.addEventListener("DOMContentLoaded", loadAllCategoryNames);
</script>
{% comment %} edit  and delete category name {% endcomment %}
<script>
function editCategory(id, event) {
  event.stopPropagation();

  const tr = document.querySelector(`tr[data-id="${id}"]`);
  const tds = tr.querySelectorAll("td");

  document.getElementById("edit_id").value = id;
  document.getElementById("edit_client").value = tds[0].innerText;
  document.getElementById("edit_category_type").value = tds[1].innerText;
  document.getElementById("edit_name").value = tds[2].innerText;
  document.getElementById("edit_passwords").value =
    tds[3].innerText === "-" ? "" : tds[3].innerText;

  const modal = new bootstrap.Modal(
    document.getElementById("editCategoryModal")
  );
  modal.show();
}

function deleteCategory(id, event) {
  event.stopPropagation(); // ❗ prevent row select

  if (!confirm("Are you sure you want to delete this record?")) {
    return;
  }

  fetch(`/client-category-name/${id}/delete/`, {
    method: "POST",
    headers: {
      "X-CSRFToken": getCSRFToken(),
      "X-Requested-With": "XMLHttpRequest"
    }
  })
  .then(res => res.json())
  .then(data => {
    if (data.ok) {
      loadAllCategoryNames(); // reload table
    } else {
      alert("Delete failed");
    }
  });
}

/* CSRF helper */
function getCSRFToken() {
  return document.cookie
    .split("; ")
    .find(row => row.startsWith("csrftoken="))
    ?.split("=")[1];
}

</script>

{% comment %} filteration {% endcomment %}
<script>
function applyColumnFilters() {
  const filters = document.querySelectorAll(".col-filter");

  document.querySelectorAll("#allCategoryNameBody tr").forEach(tr => {
    const tds = tr.querySelectorAll("td");
    let visible = true;

    filters.forEach(f => {
      const colIndex = parseInt(f.dataset.col);
      const filterVal = f.value;

      if (!filterVal) return;

      const cellText = tds[colIndex]?.innerText.trim();
      if (cellText !== filterVal) {
        visible = false;
      }
    });

    tr.style.display = visible ? "" : "none";
  });
}

// attach change event
document.querySelectorAll(".col-filter").forEach(sel => {
  sel.addEventListener("change", applyColumnFilters);
});
</script>
<script>
function populateColumnFilters() {
  const map = {};

  document.querySelectorAll(".col-filter").forEach(f => {
    map[f.dataset.col] = new Set();
  });

  document.querySelectorAll("#allCategoryNameBody tr").forEach(tr => {
    const tds = tr.querySelectorAll("td");

    Object.keys(map).forEach(idx => {
      map[idx].add(tds[idx]?.innerText.trim());
    });
  });

  document.querySelectorAll(".col-filter").forEach(f => {
    const idx = f.dataset.col;
    const current = f.value;

    // keep first option
    f.length = 1;

    [...map[idx]].sort().forEach(v => {
      if (!v || v === "-") return;
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      f.appendChild(opt);
    });

    f.value = current;
  });
}
</script>



<!-- Edit Category Modal -->
<div class="modal fade" id="editCategoryModal" tabindex="-1">
  <div class="modal-dialog modal-md">
    <form class="modal-content" id="editCategoryForm">
      <div class="modal-header">
        <h5 class="modal-title">Edit Category Name</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

     <div class="modal-body">
        <input type="hidden" id="edit_id">

        <div class="mb-2">
          <label class="form-label">Client</label>
          <input type="text" class="form-control" id="edit_client" disabled>
        </div>

        <div class="mb-2">
          <label class="form-label">Category Type</label>
          <input type="text" class="form-control" id="edit_category_type" disabled>
        </div>

        <div class="mb-2">
          <label class="form-label">Category Name</label>
          <input type="text"
                class="form-control"
                id="edit_name"
                required>
        </div>

        <div class="mb-2">
          <label class="form-label">Passwords</label>
          <input type="text"
                class="form-control"
                id="edit_passwords">
        </div>

      </div>


      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary">
          Update
        </button>
      </div>
    </form>
  </div>
</div>
{% comment %} edit script {% endcomment %}
<script>
document.addEventListener("DOMContentLoaded", function () {

  document.getElementById("editCategoryForm")
    .addEventListener("submit", function (e) {

    e.preventDefault();

    const id = document.getElementById("edit_id").value;

    const formData = new FormData();
    formData.append("name", document.getElementById("edit_name").value);
    formData.append("passwords", document.getElementById("edit_passwords").value);

    fetch(`/client-category-name/${id}/edit/`, {
      method: "POST",
      headers: {
        "X-CSRFToken": getCSRFToken(),
        "X-Requested-With": "XMLHttpRequest"
      },
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      if (data.ok) {
        bootstrap.Modal
          .getInstance(document.getElementById("editCategoryModal"))
          .hide();

        loadAllCategoryNames();
      } else {
        alert(data.error || "Update failed");
      }
    });
  });

});
</script>
</body>
</html>
